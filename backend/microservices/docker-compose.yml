services:
  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: userdb
    volumes:
      - pg_user:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d userdb"]
      interval: 3s
      timeout: 5s
      retries: 10

  postgres-rent:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rent
      POSTGRES_PASSWORD: rent
      POSTGRES_DB: rentdb
    volumes:
      - pg_rent:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rent -d rentdb"]
      interval: 3s
      timeout: 5s
      retries: 10

  postgres-comm:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: comm
      POSTGRES_PASSWORD: comm
      POSTGRES_DB: commdb
    volumes:
      - pg_comm:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comm -d commdb"]
      interval: 3s
      timeout: 5s
      retries: 10

  s3:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - s3_data:/data

  user-manager:
    build: ./user-manager
    depends_on:
      postgres-user:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      GRAPHQL_PORT: "4001"
      DATABASE_URL: postgres://user:user@postgres-user:5432/userdb
      JWT_SECRET: dev-jwt-secret-change-me
      INTERNAL_SERVICE_TOKEN: dev-internal-token
      ACCESS_TOKEN_TTL_SEC: "900"
      REFRESH_TOKEN_TTL_SEC: "604800"

  rent-manager:
    build: ./rent-manager
    depends_on:
      postgres-rent:
        condition: service_healthy
      user-manager:
        condition: service_started
      s3:
        condition: service_started
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      GRAPHQL_PORT: "4002"
      DATABASE_URL: postgres://rent:rent@postgres-rent:5432/rentdb
      USER_MANAGER_URL: http://user-manager:3001
      INTERNAL_SERVICE_TOKEN: dev-internal-token
      JWT_SECRET: dev-jwt-secret-change-me
      S3_ENDPOINT: http://s3:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: listing-photos
      S3_PUBLIC_BASE_URL: http://localhost:9000/listing-photos

  communication-manager:
    build: ./communication-manager
    depends_on:
      postgres-comm:
        condition: service_healthy
      user-manager:
        condition: service_started
    ports:
      - "3003:3003"
    environment:
      PORT: "3003"
      GRAPHQL_PORT: "4003"
      DATABASE_URL: postgres://comm:comm@postgres-comm:5432/commdb
      USER_MANAGER_URL: http://user-manager:3001
      RENT_MANAGER_URL: http://rent-manager:3002
      INTERNAL_SERVICE_TOKEN: dev-internal-token
      JWT_SECRET: dev-jwt-secret-change-me

  gateway:
    build: ./gateway
    depends_on:
      - user-manager
      - rent-manager
      - communication-manager
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      USER_GRAPHQL_URL: http://user-manager:4001
      RENT_GRAPHQL_URL: http://rent-manager:4002
      COMM_GRAPHQL_URL: http://communication-manager:4003

volumes:
  pg_user:
  pg_rent:
  pg_comm:
  s3_data:
