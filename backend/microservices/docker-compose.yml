services:
  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: userdb
    volumes:
      - pg_user:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d userdb" ]
      interval: 3s
      timeout: 5s
      retries: 10

  postgres-rent:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rent
      POSTGRES_PASSWORD: rent
      POSTGRES_DB: rentdb
    volumes:
      - pg_rent:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rent -d rentdb" ]
      interval: 3s
      timeout: 5s
      retries: 10

  postgres-comm:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: comm
      POSTGRES_PASSWORD: comm
      POSTGRES_DB: commdb
    volumes:
      - pg_comm:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U comm -d commdb" ]
      interval: 3s
      timeout: 5s
      retries: 10

  s3:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - s3_data:/data

  user-manager:
    build: ./user-manager
    depends_on:
      postgres-user:
        condition: service_healthy
    ports:
      - "${USER_MANAGER_PORT:-3001}:3001"
    env_file: .env
    environment:
      PORT: 3001
      GRAPHQL_PORT: 4001
      DATABASE_URL: ${USER_MANAGER_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      ACCESS_TOKEN_TTL_SEC: ${ACCESS_TOKEN_TTL_SEC}
      REFRESH_TOKEN_TTL_SEC: ${REFRESH_TOKEN_TTL_SEC}

  rent-manager:
    build: ./rent-manager
    depends_on:
      postgres-rent:
        condition: service_healthy
      user-manager:
        condition: service_started
      s3:
        condition: service_started
    ports:
      - "${RENT_PORT:-3002}:3002"
    env_file: .env
    environment:
      PORT: 3002
      GRAPHQL_PORT: 4002
      DATABASE_URL: ${RENT_DATABASE_URL}
      USER_MANAGER_URL: ${RENT_USER_MANAGER_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}

  communication-manager:
    build: ./communication-manager
    depends_on:
      postgres-comm:
        condition: service_healthy
      user-manager:
        condition: service_started
    ports:
      - "${COMMUNICATION_PORT:-3003}:3003"
    env_file: .env
    environment:
      PORT: 3003
      GRAPHQL_PORT: 4003
      DATABASE_URL: ${COMMUNICATION_DATABASE_URL}
      USER_MANAGER_URL: ${COMMUNICATION_USER_MANAGER_URL}
      RENT_MANAGER_URL: ${COMMUNICATION_RENT_MANAGER_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      JWT_SECRET: ${JWT_SECRET}

  gateway:
    build: ./gateway
    depends_on:
      - user-manager
      - rent-manager
      - communication-manager
    restart: on-failure
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    env_file: .env
    environment:
      PORT: 3000
      USER_GRAPHQL_URL: ${USER_GRAPHQL_URL}
      RENT_GRAPHQL_URL: ${RENT_GRAPHQL_URL}
      COMM_GRAPHQL_URL: ${COMM_GRAPHQL_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    depends_on:
      - gateway
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      GATEWAY_UPSTREAM: ${GATEWAY_UPSTREAM}
    env_file: .env

volumes:
  pg_user:
  pg_rent:
  pg_comm:
  s3_data:
